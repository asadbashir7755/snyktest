name: Snyk Combined Scan With SAST    # Full SCA + SAST + IaC, eval modes

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: "GitHub repository URL (for example: https://github.com/org/repo)"
        required: true
      branch:
        description: "Branch name to scan"
        required: true
        default: "main"

jobs:
  security:
    runs-on: ubuntu-latest          # Use GitHub-hosted runner

    steps:
      - name: Resolve repository from input
        id: resolve_repo
        shell: bash
        run: |
          INPUT_REPO="${{ github.event.inputs.repo_url }}"

          # Accept either full URL or owner/repo format.
          if [[ "$INPUT_REPO" =~ ^https://github\.com/([^/]+/[^/.]+)(\.git)?/?$ ]]; then
            REPO_NAME="${BASH_REMATCH[1]}"
          elif [[ "$INPUT_REPO" =~ ^[^/]+/[^/]+$ ]]; then
            REPO_NAME="$INPUT_REPO"
          else
            echo "Invalid repo input: $INPUT_REPO"
            echo "Use https://github.com/<owner>/<repo> or <owner>/<repo>"
            exit 1
          fi

          echo "repository=$REPO_NAME" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.resolve_repo.outputs.repository }}
          ref: ${{ github.event.inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}
        # Pulls the repository contents into the runner workspace so Snyk
        # can see all files (source, manifests, Terraform, K8s, etc.).

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        # Installs the Snyk CLI on the runner and wires it to use SNYK_TOKEN.
        # After this, we can call `snyk ...` in normal shell commands.

      - name: Configure Snyk endpoint and auth
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_ORG_ID: ${{ secrets.SNYK_ORG_ID }}
        run: |
          # Configure Snyk for the Worldpay US region and authenticate.
          # Equivalent to running these in a terminal on the runner:
          #   snyk config set endpoint=https://api.us.snyk.io
          #   snyk auth "$SNYK_TOKEN"
          snyk config set endpoint=https://api.us.snyk.io
          snyk auth "$SNYK_TOKEN"

      - name: Detect supported app manifests
        id: detect_manifests
        run: |
          # SCA pre-check:
          # Look for common dependency manifest files anywhere in the repo.
          # This tells us whether it makes sense to run open‑source SCA scans.
          if git ls-files | grep -E '(^|/)(package\.json|pom\.xml|build\.gradle|build\.gradle\.kts|requirements\.txt|Pipfile|poetry\.lock|pyproject\.toml|go\.mod|Gemfile|composer\.json|paket\.dependencies|packages\.config|project\.assets\.json|Package\.swift)$' >/dev/null; then
            echo "has_manifests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_manifests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Snyk IaC test (eval mode)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_ORG_ID: ${{ secrets.SNYK_ORG_ID }}
        run: |
          # INFRA / IaC SCAN
          # Always run IaC scanning over the repo:
          # - Terraform
          # - Kubernetes manifests / Helm output it can parse
          # - Other supported YAML/JSON IaC
          # Note: Snyk IaC does NOT parse Pulumi programs directly; it only
          # scans any Terraform/K8s/YAML/JSON artifacts present.
          # Eval mode: issues will be reported but not block the pipeline.
          snyk iac test . --org="$SNYK_ORG_ID" --severity-threshold=low

      - name: Snyk test all supported app projects (eval mode)
        if: steps.detect_manifests.outputs.has_manifests == 'true'
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_ORG_ID: ${{ secrets.SNYK_ORG_ID }}
        run: |
          # SCA (OPEN‑SOURCE DEPENDENCIES)
          # Only run if we detected at least one supported manifest above.
          # --all-projects: recursively discover all manifests (npm, Maven, etc.).
          # --detection-depth: how deep in the tree to search.
          # --severity-threshold=low: show everything (low and above) during eval.
          # Eval mode: vulnerabilities will NOT fail the workflow.
          snyk test --all-projects --detection-depth=6 --org="$SNYK_ORG_ID" --severity-threshold=low

      - name: Snyk monitor all supported app projects (eval mode)
        if: steps.detect_manifests.outputs.has_manifests == 'true'
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_ORG_ID: ${{ secrets.SNYK_ORG_ID }}
        run: |
          # SCA MONITORING SNAPSHOT
          # Sends all discovered app projects to Snyk so they appear in the Snyk UI,
          # and can be tracked over time for new vulnerabilities (release-style view).
          # Only runs when manifests exist; non‑blocking in eval mode.
          snyk monitor --all-projects --org="$SNYK_ORG_ID"

      - name: Skip app SCA because no supported manifests were found
        if: steps.detect_manifests.outputs.has_manifests != 'true'
        run: |
          # Documentation-only step:
          # Makes it obvious in logs when this is an infra‑only repo
          # and SCA/monitor steps were intentionally skipped.
          echo "No supported app manifests found in this repo; skipping SCA and monitor steps."

      - name: Snyk SAST (code) test (eval mode)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_ORG_ID: ${{ secrets.SNYK_ORG_ID }}
        run: |
          # SAST / SNYK CODE
          # Run static application security testing against the source code in
          # this repository (detects insecure coding patterns, logic issues, etc.).
          # This mirrors the 'snyk code test' usage shown in your SAST docs.
          # Eval mode: findings are reported but do NOT fail the workflow.
          snyk code test --org="$SNYK_ORG_ID"

      - name: Mark job as succeeded (eval mode)
        if: always()
        run: |
          # Final guard step:
          # Ensures that even if Snyk commands returned non-zero exit codes,
          # the overall job is marked successful. This keeps the entire workflow
          # strictly informational / evaluation‑only.
          echo "Snyk combined SCA + SAST + IaC scan ran in eval mode on GitHub-hosted runner; findings will not block."
